---
- name: Deploy to Kubernetes
  hosts: localhost
  tasks:
    - name: Find all Kubernetes manifests
      find:
        paths: "{{ playbook_dir }}/.."
        recurse: yes
        patterns: "*.yaml,*.yml"
      register: k8s_files

    - name: Apply all discovered manifests
      command: "kubectl apply -f {{ item.path }}"
      loop: "{{ k8s_files.files }}"
      # This skips the ansible files themselves if they are .yml
      when: "'k8s' in item.path"