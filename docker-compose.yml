version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-resource-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_resource_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_resource_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  resource-service:
    build:
      context: ./services/resource-service
      dockerfile: Dockerfile
    container_name: resource-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_resource_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_resource_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      USER_SERVICE_URL: http://user-service:5001
      RESOURCE_SERVICE_URL: http://resource-service:5002
      BOOKING_SERVICE_URL: http://booking-service:5003
    depends_on:
      - user-service
      - resource-service
      - booking-service
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
