name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: echo "Install step"

    - name: Build Docker Images
      run: docker compose build

    - name: Run containers
      run: docker compose up -d